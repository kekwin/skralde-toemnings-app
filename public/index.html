<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skraldetømning</title>
  <!-- Emoji favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗑️</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <!-- ── Header ── -->
    <header>
      <div class="header-left">
        <span class="header-icon" aria-hidden="true">🗑️</span>
        <div>
          <h1>Skraldetømning</h1>
          <p id="current-address" class="header-subtitle">Klar til søgning&hellip;</p>
        </div>
      </div>
    </header>

    <!-- ── Action bar (shown when dates are visible) ── -->
    <div class="actions hidden" id="action-bar">
        <button id="refresh-btn" class="btn btn-ghost">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"
               width="15" height="15" aria-hidden="true">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
          </svg>
          Opdater
        </button>
        <button id="change-address-btn" class="btn btn-ghost">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"
               width="15" height="15" aria-hidden="true">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Skift adresse
        </button>
        <a id="ics-link" href="/api/calendar.ics"
           download="skraldetomning.ics"
           class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"
               width="15" height="15" aria-hidden="true">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download kalender (.ics)
        </a>
        <a href="/print.html" target="_blank" rel="noopener" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"
               width="15" height="15" aria-hidden="true">
            <polyline points="6 9 6 2 18 2 18 9"/>
            <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
          Udskriv / PDF
        </a>
    </div>

    <!-- ── Address search ── -->
    <section id="search-section">
      <div class="card">
        <label for="search-input" class="field-label">Din adresse</label>
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            id="search-input"
            placeholder="Søg vejnavn, fx Rendsagervej 12…"
            autocomplete="off"
            spellcheck="false"
            aria-label="Søg adresse"
            aria-autocomplete="list"
            aria-controls="autocomplete"
          />
          <div id="autocomplete" class="autocomplete hidden" role="listbox"></div>
        </div>
      </div>
    </section>

    <!-- ── Loading ── -->
    <div id="loading" class="loading-wrap hidden" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <span>Henter tømmedatoer&hellip;</span>
    </div>

    <!-- ── Error ── -->
    <div id="error-msg" class="error-card hidden" role="alert">
      <span class="error-icon" aria-hidden="true">⚠️</span>
      <span id="error-text"></span>
      <button id="retry-btn" class="btn-link">Prøv igen</button>
    </div>

    <!-- ── Dates ── -->
    <section id="dates-section" class="hidden">
      <div id="dates-list"></div>
    </section>

  </div>
  <script src="app.js"></script>
</body>
</html>
